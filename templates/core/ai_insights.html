{% extends "base.html" %}

{% block title %}AI Financial Insights{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-semibold text-gray-900">AI Financial Insights</h1>
        <a href="{% url 'dashboard' %}" class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Back to Dashboard
        </a>
    </div>

    <div class="bg-white overflow-hidden shadow rounded-lg">
        <div class="px-4 py-5 sm:p-6">
            {% if insights %}
                <div class="prose max-w-none text-gray-700">
                    {{ insights|linebreaks }}
                </div>
            {% else %}
                <p class="text-gray-500">No insights available.</p>
            {% endif %}
        </div>
        <div class="bg-gray-50 px-4 py-4 sm:px-6">
            <div class="text-sm">
                <p class="text-gray-500 italic text-center">Powered by local Ollama AI model</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

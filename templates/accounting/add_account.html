{% extends "base.html" %}

{% block title %}Add Account{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 2rem;">
        <h2>Add Account</h2>
        <p class="text-muted">Create a new bank account to organize your uploaded statements.</p>
    </div>

    <form action="{% url 'add_account' %}" method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="name">Account Nickname</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Primary Checking" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="bank_name">Bank Name (Optional)</label>
            <input type="text" id="bank_name" name="bank_name" placeholder="e.g. Chase" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="account_number">Account Number Last 4 (Optional)</label>
            <input type="text" id="account_number" name="account_number" placeholder="e.g. 1234" autocomplete="off">
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
            <a href="{% url 'upload_statement' %}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Account</button>
        </div>
    </form>
</div>
{% endblock %}

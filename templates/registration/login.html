{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant - Log In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div style="position: absolute; top: 2rem; left: 2rem;">
            <a href="{% url 'landing' %}" class="btn btn-ghost" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 500;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg>
                Home
            </a>
        </div>
        <div class="card auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="{% url 'landing' %}" class="logo" style="display: block; margin-bottom: 1rem;">Accountant.</a>
                <h2>Welcome Back</h2>
                <p class="text-muted" style="font-size: 0.9rem;">Sign in to your account to continue.</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-error text-center" style="font-size: 0.875rem;">
                Your username and password didn't match. Please try again.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" autofocus autocomplete="username" maxlength="150" required id="id_username">
                </div>

                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password">
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Log In</button>
                    <input type="hidden" name="next" value="{{ next }}">
                </div>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                <p class="text-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-accent">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
